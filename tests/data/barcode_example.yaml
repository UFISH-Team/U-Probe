# Simple barcode generation configuration for testing

barcode_generation:
  # PCR barcodes - small set for quick testing
  pcr_barcodes:
    strategy: "max_orthogonality"
    num_barcodes: 5
    length: 8
    alphabet: "ACGT"
    rc_free: true
    gc_limits: [2, 6]
    prevent_patterns: ["AAAA", "TTTT", "CCCC", "GGGG"]
    save_file: "pcr_barcodes.txt"
    analyze_quality: true

  # Simple barcodes with 3-letter alphabet
  simple_barcodes:
    strategy: "max_orthogonality"
    num_barcodes: 8
    length: 6
    alphabet: "ACT"
    rc_free: false
    save_file: "simple_barcodes.txt"

  # Maximum size strategy test
  max_size_test:
    strategy: "max_size"
    length: 8
    k_constraint: 4
    alphabet: "ACT"
    rc_free: true
    save_file: "max_size_barcodes.txt"
    analyze_quality: true 