
name: simple
description: A simple protocol for test

genome: hg38

targets:
  type: exon
  gene_names:
    - SRY

barcode_set:
  A-488: xxxxxxxxxA1
  A-594: xxxxxxxxxA2
  B-488: xxxxxxxxxB2

encoding:
  SRY:
    barcode1: A-488
    barcode2: A-488

extracts:
  target_region:
    source: targets
    length: 40
    overlap: length / 2

probes:
  probe1:
    template: "{part1}AAA{part2}"
    parts:
      part1:
        length: 13
        source: target_region[0:length]
      part2:
        length: 13
        source: target_region[-length:]

attributes:
  n_mapped_genes:
    target: target_region
    type: n_mapped_genes
    aligner: bowtie2
    similarity_threshold_ratio: 0.75
  target_gc_content:
    target: target_region
    type: gc_content
  tm1:
    target: probe1:part1
    type: annealing_temperature

filters:
  tm:
    condition: tm1 <= 45

post_process:
  - sort:
    - tm1
  - remove_overlap
