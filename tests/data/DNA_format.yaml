name: DNAprobe

description: Protocol for designing probe type Probe_9379 from species hg19

genome: hg38

extracts:
  target_region:
    source: genome
    length: 70
    overlap: 20

targets:
  - NC_000017.11:40304334-40362489
  - NC_000003.12:197795559-198295559

encoding:
  NC_000017.11:40304334-40362489:
    BC1: CCCCCCCCCCCCCCCC
    BC2: TTTTTTTTTTTTTTTT
  NC_000003.12:197795559-198295559:
    BC1: CCCCCCCCCCCCCCCC
    BC2: TTTTTTTTTTTTTTTT

probes:
  probe_1:
    template: "{part1}{part2}{part3}"
    parts:
      part1:
        expr: "encoding[target]['BC1']"
      part2:
        expr: "target_region[:]"
      part3:
        expr: "encoding[target]['BC2']"

attributes:
  # probe_1 part2 attributes
  probe1_part2_gcContent:
    target: probe_1.part2
    type: gc_content
  probe1_part2_tm:
    target: probe_1.part2
    type: annealing_temperature
  probe1_part2_selfMatch:
    target: probe_1.part2
    type: self_match
  probe1_part2_foldScore:
    target: probe_1.part2
    type: fold_score
  probe1_part2_mappedSites:
    target: probe_1.part2
    type: mapped_sites
    aligner: bowtie2
  probe1_part2_kmerCount:
    target: probe_1.part2
    type: kmer_count
    kmer_len: 35
    threads: 10
    size: 1G
    aligner: jellyfish

post_process:
  filters:
    # probe1 part2
    probe1_part2_kmerCount:
      condition: probe1_part2_kmerCount <= 100

  # clean
  avoid_otp:
    NC_000017.11:40304334-40362489:
      target_regions:
        - NC_000017.11:40304334-40362489
      density_thresh: 1e-5
    NC_000003.12:197795559-198295559:
      target_regions:
        - NC_000003.12:197795559-198295559
      density_thresh: 1e-5
  

  # equal_space
  equal_space:
    NC_000017.11:40304334-40362489:
      number_desired: 500
    NC_000003.12:197795559-198295559:
      number_desired: 1000

  # remove overlap
  remove_overlap:
    location_interval: 0

  sorts:
    is_ascending:
      - probe1_part2_gcContent
      - probe1_part2_tm
    is_descending:
      - probe1_part2_selfMatch
      - probe1_part2_foldScore
      - probe1_part2_kmerCount
      
  # Summary statistics configuration
  summary:
    attributes:
      # Probe part2 statistics (main sequence)
      probe1_part2_gcContent:
        stats: ["count", "mean", "std", "min", "max", "median"]
        visualizations: ["histogram", "boxplot"]
      probe1_part2_tm:
        stats: ["count", "mean", "std", "min", "max"]
        visualizations: ["histogram", "boxplot"]
      probe1_part2_selfMatch:
        stats: ["count", "mean", "std", "min", "max"]
        visualizations: ["histogram", "boxplot"]
      probe1_part2_foldScore:
        stats: ["count", "mean", "std", "min", "max"]
        visualizations: ["histogram", "boxplot"]
      probe1_part2_kmerCount:
        stats: ["count", "mean", "median", "max"]
        visualizations: ["histogram", "boxplot"]
        

report:
  types:
    - base_info
    - plot
  template: "scientific"  # Options: basic, detailed, scientific
