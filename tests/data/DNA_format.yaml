name: DNAprobe

description: Protocol for designing probe type Probe_9379 from species hg19

genome: hg38

extracts:
  target_region:
    source: genome
    length: 70
    overlap: 20

targets:
  - pool7-RARA;chr17:38092814-38578814;6000;1e-4


encoding:
  pool7-RARA:
    BC1: CCCCCCCCCCCCCCCC
    BC2: TTTTTTTTTTTTTTTT


probes:
  probe_1:
    template: "{part1}{part2}{part3}"
    parts:
      part1:
        expr: "encoding[gene_id]['BC1']"
      part2:
        expr: "target_region[:]"
      part3:
        expr: "encoding[gene_id]['BC2']"

attributes:
  # target region attributes
  target_gcContent:
    target: target_region
    type: gc_content
  target_tm:
    target: target_region
    type: annealing_temperature
  target_mappedGenes:
    target: target_region
    type: n_mapped_genes
    aligner: bowtie2
    min_mapq: 30
  target_selfMatch:
    target: target_region
    type: self_match
  target_foldScore:
    target: target_region
    type: fold_score
  target_AvoidOTP:
    target: target_region
    type: avoid_otp
    aligner: bowtie2
  # probe part attributes
  probe1_part1_tm:
    target: probe_1:part1
    type: annealing_temperature
  probe1_part3_tm:
    target: probe_1:part3
    type: annealing_temperature

    
  # probe attributes
  probe1_foldScore:
    target: probe_1
    type: fold_score
  probe1_gcContent:
    target: probe_1
    type: gc_content
  probe1_tm:
    target: probe_1
    type: annealing_temperature


post_process:
  filters:
    # target region
    target_gcContent:
      condition: target_gcContent >= 0.4 & target_gcContent <= 0.8
    target_mappedGenes:
      condition: target_mappedGenes <= 5
      
    # probe part  
    probe1_part1_tm:
      condition: probe1_part1_tm >= 35 & probe1_part1_tm <= 44
    probe1_part3_tm:
      condition: probe1_part3_tm >= 35 & probe1_part3_tm <= 44
    probe1_tm:
      condition: probe1_tm >= 35 & probe1_tm <= 44
      
  sorts:
    is_ascending:
      - probe1_part1_tm
      - probe1_part3_tm
      - probe1_tm
    is_descending:
      - target_mappedGenes
      - target_selfMatch
      - target_foldScore

      
  remove_overlap:
    location_interval: 5
