name: RCA Double Hybridization
description: Protocol for designing probe for hybridization RCA experiment with double barcodes

genome: hg38

targets:
  - HSFY3P
  - ZFY

barcode_set:
  A-488: AAACCCTTGGCC
  A-594: GGGGAAAATTTC
  B-488: GGTCTATTCGGG

encoding:
  gene1:
    barcode1: A-488
    barcode2: A-488
  gene2:
    barcode1: A-488
    barcode2: A-594

extracts:
  target_region:
    source: targets
    min_length: 40
    template: "{part1}{part2}N{part3}"
    parts:
      part1: 
        length: 13
        source: "target_region[0:length]"
      part2: 
        length: 13
        source: "target_region[len(part1):len(part1)+length]"
      part3:
        length: 13
        source: "target_region[-length:]"

probes:
  circle_probe:
    template: "{part1}{part1}{part3}"
    parts: 
      part1:
        length: extracts:target_region:parts:part1:length
        source: rc(target_region:part1)
      part2:
        template: "{barcode1}N{barcode2}"
        parts:
          barcode1
          barcode2
      part3:
        length: extracts:target_region:parts:part3:length
        source: rc(extracts:target_region:parts:part3)

  amp_probe:
    template: "{part1}N{part2}"
    parts:
      part1:
        source: rc(extracts:target_region:parts:part3)
      part2:
        source: rc(circle_probe:part2:parts:barcode2)

attributes:
  n_mapped_genes:
    target: target_region
    type: n_mapped_genes
    aligner: bowtie2
    similarity_threshold_ratio: 0.75

  target_gc_content:
    target: target_region
    type: gc_content  

  tm1:
    target: circle_probe:part1
    type: annealing_temperature
  tm2:
    target: circle_probe:part2
    type: annealing_temperature
  tm3:
    target: circle_probe:part3
    type: annealing_temperature
  target_fold_score:
    target: target_region
    type: fold_score
  circle_fold_score:
    target: circle_probe
    type: fold_score
  amp_fold_score:
    target: amp_probe
    type: fold_score
  circle_self_match:
    target: circle_probe
    type: self_match
  amp_self_match:
    target: amp_probe
    type: self_match
  blocks:
    target: target_region
    type: blocks

post_process:
  filters:
    n_mapped_genes: 4
    tm:
      min: 35
      max: 45
    target_fold_score: 50
    gc_content: 0.5
    circle_AT:
    
  sorts:
    is_ascending: 
      - n_mapped_genes
      - target_fold_score
      - circle_fold_score
      - circle_self_match
      - amp_fold_score
      - self_match_amp
      - target_blocks
      - target_fold_score
    is_descending:
      - n_trans
  remove_overlap:
    location_interval: 5