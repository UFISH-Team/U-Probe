name: RCA Double Hybridization
description: Protocol for designing probe for hybridization RCA experiment with double barcodes

genome: test

targets:
  - Cryl1
  - g42115
  
encoding:
  Cryl1: 
    barcode1: AAAATTTTTTTTAAGCA
    barcode2: ATTTATTGCGATTTGGC
  g42115:
    barcode1: AAAATTTTTTTTAAGCA
    barcode2: GGTTTTTTTTTTTTTTT

extracts:
  target_region: 
    source: exon
    length: 40
    overlap: 20

probes:
  circle_probe:
    template: "{part1}{part2}{part3}"
    parts:
      part1:
        length: 13
        expr: "rc(target_region[0:13])"
      part2:
        template: "{barcode1}N{barcode2}"
        parts:
          barcode1:
            expr: "encoding[gene_id]['barcode1']"
          barcode2:
            expr: "encoding[gene_id]['barcode2']"
      part3:
        length: 13
        expr: "rc(target_region[13:26])"

  amp_probe:
    template: "{part1}N{part2}"
    parts:
      part1:
        expr: "rc(circle_probe.part2.barcode2)"
      part2:
        expr: "rc(target_region[-13:])"

attributes:
  fold_score:
    target: circle_probe:part1
    type: fold_score
  n_mapped_genes:
    target: target_region
    type: n_mapped_genes
    aligner: bowtie2
    similarity_threshold_ratio: 0.75
  target_gc_content:
    target: target_region
    type: gc_content
  tm1:
    target: circle_probe:part1
    type: annealing_temperature
  tm2:
    target: circle_probe:part3
    type: annealing_temperature
  tm3:
    target: amp_probe:part2
    type: annealing_temperature
  circle_fold_score:
    target: circle_probe
    type: fold_score
  amp_fold_score:
    target: amp_probe
    type: fold_score

post_process:
  filters:
    tm1:
      condition: tm1 >= 35 & tm1 <= 45 
    tm2:
      condition: tm2 <= 45 & tm2 >= 35 
    tm3:
      condition: tm3 <= 45 & tm3 >= 35
    circle_fold_score:
      condition: circle_fold_score <= 80
    n_mapped_genes:
      condition: n_mapped_genes <= 4
  sorts:
    is_descending:
      - circle_fold_score
      - amp_fold_score
    is_ascending:
      - tm1

  remove_overlap:
    location_interval: 0
