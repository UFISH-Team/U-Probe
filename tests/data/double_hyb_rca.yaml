name: RCA Double Hybridization - 240913
description: Protocol for designing probe for hybridization RCA experiment with double barcodes

genome: oryza

targets:
  - LOC107281753
  - LOC4326462
  - LOC107279812
  - LOC4326459

barcode_set:
  A-488: AAACCCTTGGCC
  A-594: GGGGAAAATTTC
  B-488: GGTCTATTCGGG

encoding:
  LOC107281753: 
    barcode1: A-488
    barcode2: A-488
  LOC4326462:
    barcode1: A-488
    barcode2: A-594
  LOC107279812:
    barcode1: A-488
    barcode2: A-594
  LOC4326459:
    barcode1: B-488
    barcode2: B-488
  

extracts:
  target_region:
    source: targets
    min_length: 40
    overlap: 35
    template: "{part1}{part2}N{part3}"
    parts:
      part1: 
        length: 13
        source: "target_region[0:length]"
      part2: 
        length: 13
        source: "target_region[len(part1):len(part1)+length]"
      part3:
        length: 13
        source: "target_region[-length:]"

probes:
  circle_probe:
    template: "{part1}{part1}{part3}"
    parts: 
      part1:
        length: extracts:target_region:parts:part1:length
        source: rc(target_region:part1)
      part2:
        template: "{barcode1}N{barcode2}"
        parts:
          barcode1
          barcode2
      part3:
        length: extracts:target_region:parts:part3:length
        source: rc(extracts:target_region:parts:part3)

  amp_probe:
    template: "{part1}N{part2}"
    parts:
      part1:
        source: rc(extracts:target_region:parts:part3)
      part2:
        source: rc(circle_probe:part2:parts:barcode2)

attributes:
  n_mapped_genes:
    target: target_region
    type: n_mapped_genes
    aligner: bowtie2
    similarity_threshold_ratio: 0.75
  target_gc_content:
    target: target_region
    type: gc_content  
  tm1:
    target: target_region:part1
    type: annealing_temperature
  tm2:
    target: target_region:part2
    type: annealing_temperature
  tm3:
    target: target_region:part3
    type: annealing_temperature
  target_fold_score:
    target: target_region
    type: fold_score
  circle_fold_score:
    target: circle_probe
    type: fold_score
  amp_fold_score:
    target: amp_probe
    type: fold_score
  circle_self_match:
    target: circle_probe
    type: self_match
  amp_self_match:
    target: amp_probe
    type: self_match
  target_blocks:
    target: target_region
    type: blocks

post_process:
  filters:
    n_mapped_genes: 10
    tm:
      min: 35
      max: 45
    target_fold_score: 30
    gc_content: 0.2
    circle_AT:
    
  sorts:
    is_ascending: 
      - n_trans
      - target_gc_content
    is_descending:
      - n_mapped_genes
      - target_fold_score
      - circle_fold_score
      - circle_self_match
      - amp_fold_score
      - amp_self_match
      - target_blocks
  remove_overlap:  
    location_interval: 10