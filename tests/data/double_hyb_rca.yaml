name: RCA Double Hybridization
description: Protocol for designing probe for hybridization RCA experiment with double barcodes

genome: hg38

targets:
  - SRY

barcode_set:
  A-488: xxxxxxxxxA1
  A-594: xxxxxxxxxA2
  B-488: xxxxxxxxxB2

encoding:
  gene1:
    barcode1: A-488
    barcode2: A-488
  gene2:
    barcode1: A-488
    barcode2: A-594

extracts:
  target_region:
    source: targets
    length: "len(cirlce_probe:part1) + len(circle_probe: part3) + len(amp_probe:part2) + 1"
    overlap: length / 2

probes:
  circle_probe:
    template: "{part1}{part2}{part3}"
    parts:
      part1:
        length: 13
        source: rc(target_region[0:length])
      part2:
        template: "{barcode1}N{barcode2}"
        parts:
          barcode1
          barcode2
      part3:
        length: 13
        source: rc(target_region[len(part1):len(part1)+length])

  amp_probe:
    template: "{part1}N{part2}"
    parts:
      part1:
        source: rc(circle_probe:part2:barcode2)
      part2:
        source: rc(target_region[-len(length):])

attributes:
  n_mapped_genes:
    target: target_region
    type: n_mapped_genes
    aligner: bowtie2
    similarity_threshold_ratio: 0.75
  target_gc_content:
    target: target_region
    type: gc_content
  tm1:
    target: circle_probe:part1
    type: annealing_temperature
  tm2:
    target: circle_probe:part3
    type: annealing_temperature
  tm3:
    target: amp_probe:part2
    type: annealing_temperature
  circle_fold_score:
    target: circle_probe
    type: fold_score
  amp_fold_score:
    target: amp_probe
    type: fold_score

filters:
  tm:
    condition: tm1 <= 45 & tm1 >= 35 & tm2 <= 45 & tm2 >= 35 & tm3 <= 45 & tm3 >= 35
  fold_score_circle:
    condition: circle_fold_score <= 80

post_process:
  - sort:
    - circle_fold_score
    - amp_fold_score
  - remove_overlap

