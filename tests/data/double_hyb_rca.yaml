name: RCA Double Hybridization
description: Protocol for designing probe for hybridization RCA experiment with double barcodes

genome: hg38

targets:
  - SRY
  - ENSG00000139618

barcode_set:
  A-488: AAAATTTTTTTTAAGCA
  B-488: ATTTCGTACGTGTCATA
  A-594: GGTTTTTTTTTTTTTTT

encoding:
  SRY: 
    barcode1: A-488
    barcode2: B-488
  ENSG00000139618:
    barcode1: A-488
    barcode2: A-594

extracts:
  target_region: 
    source: targets
    length: 60
    overlap: 30

probes:
  circle_probe:
    template: "{part1}{part2}{part3}"
    parts:
      part1:
        length: 13
        expr: rc(target_region[0:length])
      part2:
        template: "{barcode1}N{barcode2}"
        parts:
          barcode1:
            expr: encoding[target_region.gene_id]['barcode1']
          barcode2:
            expr: encoding[target_region.gene_id]['barcode2']
      part3:
        length: 13
        expr: rc(target_region[part1.length:part1.length+length])

  amp_probe:
    template: "{part1}N{part2}"
    parts:
      part1:
        expr: rc(circle_probe.part2.barcode2)
      part2:
        expr: rc(target_region[-self.length:])

attributes:
  n_mapped_genes:
    target: target_region
    type: n_mapped_genes
    aligner: bowtie2
    similarity_threshold_ratio: 0.75
  target_gc_content:
    target: target_region
    type: gc_content
  tm1:
    target: circle_probe:part1
    type: annealing_temperature
  tm2:
    target: circle_probe:part3
    type: annealing_temperature
  tm3:
    target: amp_probe:part2
    type: annealing_temperature
  circle_fold_score:
    target: circle_probe
    type: fold_score
  amp_fold_score:
    target: amp_probe
    type: fold_score

filters:
  tm:
    condition: tm1 <= 45 & tm1 >= 35 & tm2 <= 45 & tm2 >= 35 & tm3 <= 45 & tm3 >= 35
  fold_score_circle:
    condition: circle_fold_score <= 80

post_process:
  - sort:
    - circle_fold_score
    - amp_fold_score
  - remove_overlap
