name: RCA Double Hybridization
description: Protocol for designing probe for hybridization RCA experiment with double barcodes

genome: hg38

targets:
  - SRY

barcode_set:
  A-488: xxxxxxxxxA1
  A-594: xxxxxxxxxA2
  B-488: xxxxxxxxxB2

encoding:
  gene1:
    barcode1: A-488
    barcode2: A-488
  gene2:
    barcode1: A-488
    barcode2: A-594

extracts:
  target_region:
    source: targets
    length: 60
    overlap: length / 2

probes:
  probe1:
    template: "{part1}{part2}N{part3}{part4}"
    parts:
      part1:
        length: 13
        expr: rc(target_region[0:length])
      part2:
        length: encoding[target_region.gene_id]['barcode1'].length
        expr: encoding[target_region.gene_id]['barcode1']
      part3:
        length: encoding[target_region.gene_id]['barcode2'].length
        expr: encoding[target_region.gene_id]['barcode2']
      part4:
        length: 13
        expr: rc(target_region[part1.length+1:part1.length+length])

  probe2:
    template: "{part1}N{part2}"
    parts:
      part1:
        expr: rc(probe1.part1)
      part2:
        length: 13
        start: probe1.part1.length*2+1
        end: probe1.part1.length*2 + length
        expr: rc(target_region[start:end])

attributes:
  n_mapped_genes:
    target: target_region
    type: n_mapped_genes
    aligner: bowtie2
    similarity_threshold_ratio: 0.75
  target_gc_content:
    target: target_region
    type: gc_content
  tm1:
    target: circle_probe:part1
    type: annealing_temperature
  tm2:
    target: circle_probe:part3
    type: annealing_temperature
  tm3:
    target: amp_probe:part2
    type: annealing_temperature
  circle_fold_score:
    target: circle_probe
    type: fold_score
  amp_fold_score:
    target: amp_probe
    type: fold_score

filters:
  tm:
    condition: tm1 <= 45 & tm1 >= 35 & tm2 <= 45 & tm2 >= 35 & tm3 <= 45 & tm3 >= 35
  fold_score_circle:
    condition: circle_fold_score <= 80

post_process:
  - sort:
    - circle_fold_score
    - amp_fold_score
  - remove_overlap