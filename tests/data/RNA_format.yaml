name: double_hyb_iss
description: Protocol for designing double hybrid ISS probes from species Mus musculus

genome: test

targets:
  - xxx: 'ATCGATCGATCGATCGATCGATCGATCGA'
  - ccc: 'TTGGAAACCCCCCCCTTGGAAACCCCCCCCTTG'

encoding:
  xxx:
    BC1: ACT
    BC2: GGA
  ccc:
    BC1: ACT
    BC2: GGA

extracts:
  target_region:
    source: exon
    length: 40
    overlap: 20
    
probes:
  probe_1:
    template: "{part1}{part2}{part3}"
    parts:
      part1:
        expr: "rc(target_region[0:13])"
      part2:
        template: "CC{barcode1}TGCGTCTATTT{barcode2}TAGTGGAGCCT"
        parts:
          barcode1:
            expr: "encoding[target]['BC1']"
          barcode2:
            expr: "encoding[target]['BC2']"
      part3:
        expr: "rc(target_region[13:26])"
  probe_2:
    template: "{part1}{part2}AGGCTCCACTA"
    parts:
      part1:
        expr: "rc(target_region[-13:])"
      part2:
        expr: "target_region[26]"

attributes:
  # target region attributes
  target_gcContent:
    target: target_region
    type: gc_content
  target_tm:
    target: target_region
    type: annealing_temperature
  target_mappedGenes:
    target: target_region
    type: n_mapped_genes
    aligner: bowtie2
    min_mapq: 30
  target_selfMatch:
    target: target_region
    type: self_match
  target_foldScore:
    target: target_region
    type: fold_score

    
  # probe part attributes
  probe1_part1_tm:
    target: probe_1:part1
    type: annealing_temperature
  probe1_part3_tm:
    target: probe_1:part3
    type: annealing_temperature
  probe2_part1_tm:
    target: probe_2:part1
    type: annealing_temperature
    
  # probe attributes
  probe1_foldScore:
    target: probe_1
    type: fold_score
  probe1_gcContent:
    target: probe_1
    type: gc_content
  probe1_tm:
    target: probe_1
    type: annealing_temperature
  probe2_foldScore:
    target: probe_2
    type: fold_score
  probe2_gcContent:
    target: probe_2
    type: gc_content


post_process:
  filters:
    # target region (relaxed filters for testing)
    target_gcContent:
      condition: target_gcContent >= 0.2 & target_gcContent <= 0.9
    target_mappedGenes:
      condition: target_mappedGenes <= 10
      
    # probe part (relaxed filters for testing)
    probe1_part1_tm:
      condition: probe1_part1_tm >= 20 & probe1_part1_tm <= 60
    probe1_part3_tm:
      condition: probe1_part3_tm >= 20 & probe1_part3_tm <= 60
    probe2_part1_tm:
      condition: probe2_part1_tm >= 20 & probe2_part1_tm <= 60
    probe1_tm:
      condition: probe1_tm >= 50 & probe1_tm <= 90
      
  sorts:
    is_ascending:
      - probe1_part1_tm
      - probe1_part3_tm
      - probe2_part1_tm
      - probe1_tm
    is_descending:
      - target_mappedGenes
      - target_selfMatch
      - target_foldScore

  remove_overlap:
    location_interval: 5
    
summary:
  report_name: rna_report  # template name  # class: template1 or template2
  attributes:
    - probe1_part1_tm
    - probe1_tm
    - probe2_foldScore
    - probe2_gcContent
    - target_selfMatch
    - target_mappedGenes



