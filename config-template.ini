[Paths]
# Base data storage path (user data, built-in probes, barcodes, genome configs, etc.)
data_dir = /home/qzhang/new/U-Probe/data
# Base directory for genome data
genomes_dir = /home/qzhang/genomes
# Task results storage path
results_dir = /home/qzhang/new/U-Probe/data/results
# Fisheye tool path
fisheye_dir = /home/qzhang/fisheye
# U-Probe server root path
uprobe_server_root = /home/qzhang/new/U-Probe

[TaskQueue]
# Number of threads allocated per task
task_threads = 10
# Max concurrent tasks (auto: calculate by CPU cores / task_threads) or a fixed number
max_concurrent_tasks = 3

[Server]
# Environment: development or production
app_env = development
# Host address: 127.0.0.1 for dev, 0.0.0.0 for prod
host = 127.0.0.1
# Port
port = 8000
# Number of workers (only effective in production, empty means CPU cores)
workers = 1
# Allowed frontend URL for CORS
frontend_url = http://localhost:5173
